<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>E8 One Lot</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151a22;
            --accent-color: #00b0ff;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
            --success: #00e676;
            --border-color: #242f41;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 500px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 20px; padding: 10px 0; }
        .header h1 { font-size: 20px; margin: 0; color: var(--text-main); }
        .header h1 span { color: var(--accent-color); }
        .header p { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
        
        input, select {
            width: 100%; box-sizing: border-box; background-color: var(--bg-color);
            border: 1px solid var(--border-color); border-radius: 10px;
            padding: 12px; color: var(--text-main); font-size: 16px; font-weight: 600; outline: none;
        }
        input:focus, select:focus { border-color: var(--accent-color); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }

        .preset-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
        .preset-btn {
            background-color: var(--bg-color); border: 1px solid var(--border-color);
            color: var(--text-muted); padding: 8px 4px; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
        }
        .preset-btn.active { background-color: var(--accent-color); color: var(--bg-color); border-color: var(--accent-color); }

        .result-card {
            background: linear-gradient(135deg, #1e2633 0%, #151a22 100%);
            border: 1px solid var(--border-color); border-radius: 16px;
            padding: 20px; text-align: center; position: relative; overflow: hidden;
        }
        .result-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent-color); }
        .result-label { font-size: 14px; color: var(--text-muted); text-transform: uppercase; }
        .result-value { font-size: 36px; font-weight: 800; color: var(--success); margin: 10px 0; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .info-item { text-align: left; }
        .info-label { font-size: 11px; color: var(--text-muted); }
        .info-val { font-size: 14px; font-weight: 600; color: var(--text-main); margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>E8 ONE <span>LOT</span></h1>
        <p>Telefondan Hızlı Erişim</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Hesap Bakiyesi ($)</label>
            <input type="text" id="balance" value="100000" inputmode="decimal">
            <div class="preset-container" id="balance-presets">
                <div class="preset-btn" data-val="25000">$25k</div>
                <div class="preset-btn" data-val="50000">$50k</div>
                <div class="preset-btn active" data-val="100000">$100k</div>
                <div class="preset-btn" data-val="200000">$200k</div>
            </div>
        </div>
        <div class="form-group">
            <label>Risk Oranı (%)</label>
            <input type="text" id="risk-percent" value="1" inputmode="decimal">
            <div class="preset-container" id="risk-presets">
                <div class="preset-btn" data-val="0.25">0.25%</div>
                <div class="preset-btn" data-val="0.5">0.5%</div>
                <div class="preset-btn active" data-val="1">1%</div>
                <div class="preset-btn" data-val="2">2%</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Enstrüman</label>
            <select id="asset">
                <option value="EURUSD">EURUSD</option>
                <option value="GBPUSD">GBPUSD</option>
                <option value="XAUUSD">XAUUSD (Altın)</option>
                <option value="XAGUSD">XAGUSD (Gümüş)</option>
                <option value="GER40">GER40 (DAX)</option>
                <option value="US30">US30 (DOW)</option>
                <option value="NAS100">NAS100 (NSDQ)</option>
                <option value="BRENT">BRENT</option>
            </select>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Giriş Fiyatı</label>
                <input type="text" id="entry-price" placeholder="0.00" inputmode="decimal">
            </div>
            <div class="form-group">
                <label>Stop Loss (SL)</label>
                <input type="text" id="sl-price" placeholder="0.00" inputmode="decimal">
            </div>
        </div>
    </div>

    <div class="result-card">
        <div class="result-label">Gereken Lot</div>
        <div class="result-value" id="final-lot">0.00</div>
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Risk Tutarı</div>
                <div class="info-val" id="risk-cash">$0.00</div>
            </div>
            <div class="info-item">
                <div class="info-label">Mesafe</div>
                <div class="info-val" id="price-diff">0.00</div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const balanceInput = document.getElementById('balance');
        const riskPercentInput = document.getElementById('risk-percent');
        const assetSelect = document.getElementById('asset');
        const entryPriceInput = document.getElementById('entry-price');
        const slPriceInput = document.getElementById('sl-price');
        
        const finalLotDisplay = document.getElementById('final-lot');
        const riskCashDisplay = document.getElementById('risk-cash');
        const priceDiffDisplay = document.getElementById('price-diff');

        const placeholders = {
            'EURUSD': { entry: '1.08500', sl: '1.08350' },
            'GBPUSD': { entry: '1.27200', sl: '1.27000' },
            'XAUUSD': { entry: '2350.00', sl: '2345.00' },
            'XAGUSD': { entry: '30.50', sl: '30.20' },
            'GER40':  { entry: '18500',  sl: '18450' },
            'US30':   { entry: '39000',  sl: '38900' },
            'NAS100': { entry: '18800',  sl: '18750' },
            'BRENT':  { entry: '82.50',  sl: '81.50' }
        };

        const contractSizes = {
            'EURUSD': 100000, 'GBPUSD': 100000, 'XAUUSD': 100, 'XAGUSD': 5000,
            'GER40': 1, 'US30': 1, 'NAS100': 1, 'BRENT': 100
        };

        function parseInputToFloat(value) {
            if (!value) return 0;
            let sanitized = value.toString().replace(/,/g, '.');
            return parseFloat(sanitized) || 0;
        }

        function calculateLot() {
            const balance = parseInputToFloat(balanceInput.value);
            const riskPercent = parseInputToFloat(riskPercentInput.value);
            const entryPrice = parseInputToFloat(entryPriceInput.value);
            const slPrice = parseInputToFloat(slPriceInput.value);
            const asset = assetSelect.value;

            const cashRisk = balance * (riskPercent / 100);
            riskCashDisplay.textContent = '$' + cashRisk.toFixed(2);

            if (balance <= 0 || riskPercent <= 0 || entryPrice <= 0 || slPrice <= 0 || entryPrice === slPrice) {
                finalLotDisplay.textContent = '0.00';
                priceDiffDisplay.textContent = '0.00';
                return;
            }

            const distance = Math.abs(entryPrice - slPrice);
            
            if (asset === 'EURUSD' || asset === 'GBPUSD') {
                priceDiffDisplay.textContent = (distance * 10000).toFixed(1) + ' Pip';
            } else if (asset === 'XAUUSD' || asset === 'XAGUSD' || asset === 'BRENT') {
                priceDiffDisplay.textContent = '$' + distance.toFixed(2);
            } else {
                priceDiffDisplay.textContent = distance.toFixed(1) + ' Puan';
            }

            const contractSize = contractSizes[asset];
            let lotSize = cashRisk / (distance * contractSize);

            if (!isFinite(lotSize) || lotSize < 0) {
                lotSize = 0;
            }

            if (lotSize > 0 && lotSize < 0.01) {
                finalLotDisplay.textContent = '0.01 (Min)';
            } else {
                finalLotDisplay.textContent = lotSize.toFixed(2);
            }
        }

        function updatePlaceholders() {
            const selected = assetSelect.value;
            entryPriceInput.placeholder = placeholders[selected].entry;
            slPriceInput.placeholder = placeholders[selected].sl;
            calculateLot();
        }

        function setupPresets(containerId, inputElement) {
            const container = document.getElementById(containerId);
            if(!container) return;
            const buttons = container.querySelectorAll('.preset-btn');
            
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    inputElement.value = btn.getAttribute('data-val');
                    calculateLot();
                });
            });

            inputElement.addEventListener('input', () => {
                buttons.forEach(b => {
                    if (b.getAttribute('data-val') === inputElement.value) {
                        b.classList.add('active');
                    } else {
                        b.classList.remove('active');
                    }
                });
                calculateLot();
            });
        }

        setupPresets('balance-presets', balanceInput);
        setupPresets('risk-presets', riskPercentInput);
        
        assetSelect.addEventListener('change', updatePlaceholders);
        entryPriceInput.addEventListener('input', calculateLot);
        slPriceInput.addEventListener('input', calculateLot);

        updatePlaceholders();
    });
</script>

</body>
</html>
